# config/secrets_template.yml

# ------------------------------------------------------------------
# Template for ZHAW-based REDCap credentials.
# Copy this file to `secrets.yml` and fill in your own values.
# The token is found in your REDCap project under Applications > API.
# There, you can request an API token from a ZHAW REDCap admin, if not available yet.
# Do NOT commit the filled‑in file -- it is ignored via .gitignore.
# ------------------------------------------------------------------

REDCAP_TOKEN: "YOUR_TOKEN_HERE"
REDCAP_URL: "https://redcap.zhaw.ch/api/"